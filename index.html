<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold text-primary" href="#">
                <i class="fa-solid fa-camera-retro"></i></i>Tony Diaz
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="menu">
                <ul class="navbar-nav">

                    <li class="nav-item">

                    </li>

                </ul>
            </div>

        </div>
    </nav>
    <div class="container-fluid main-container">

        <div class="form-wrapper">

            <h3 class="text-center mb-1 titulo">
                FORMULARIO DE DATOS DE USUARIO
            </h3>

            <form>

                <!-- Nombre -->
                <label class="form-label">Nombre Completo:</label>
                <div class="input-group mb-2">
                    <span class="input-group-text icon-box">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" class="form-control input-custom" placeholder="Ingrese su nombre y apellido">
                </div>

                <!-- Correo -->
                <label class="form-label">Correo Electrónico:</label>
                <div class="input-group mb-2">
                    <span class="input-group-text icon-box">
                        <i class="fa-solid fa-at"></i>
                    </span>
                    <input type="email" class="form-control input-custom" placeholder="ejemplo@correo.com">
                </div>

                <!-- Telefono -->
                <label class="form-label">Número de Teléfono:</label>
                <div class="input-group mb-2">
                    <span class="input-group-text icon-box">
                        <i class="fa-solid fa-mobile"></i>
                    </span>
                    <input type="text" class="form-control input-custom" placeholder="+52 123 456 7890">
                </div>

                <!-- Ciudad -->
                <label class="form-label">Ciudad y Estado:</label>
                <div class="input-group mb-2">
                    <span class="input-group-text icon-box">
                        <i class="fa-solid fa-location-dot"></i>
                    </span>
                    <input type="text" class="form-control input-custom" placeholder="Ingrese su ciudad y estado">
                </div>

                <!-- Mensaje -->
                <label class="form-label">Mensaje / Comentario:</label>
                <div class="input-group mb-2">
                    <span class="input-group-text icon-box">
                        <i class="fa-solid fa-comment"></i>
                    </span>
                    <textarea class="form-control input-custom textarea"
                        placeholder="Escriba su mensaje aquí (opcional)..."></textarea>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-2">

                    <small class="text-muted">
                        *Al enviar, aceptas nuestra política de privacidad.*
                    </small>

                    <button class="btn btn-primary boton-enviar">
                        ENVIAR DATOS
                    </button>

                </div>

            </form>

        </div>
    </div>
    <div class="d-flex justify-content-center my-2">
        <a href="glass.html" class="btn btn-primary btn-lg">
            Ver formulario transparente
        </a>
    </div>
    </div>
