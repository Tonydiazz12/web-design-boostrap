<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulario de Datos</title>

<!-- Bootstrap -->
<!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 -->
    <link href="/assets/css/boostrap.min.css" rel="stylesheet"

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- CSS -->
<link rel="stylesheet" href="/assets/css/styles.css"> 
</head>

<body>

<div class="container-fluid main-container">

    <div class="form-wrapper">

        <h3 class="text-center mb-1 titulo">
            FORMULARIO DE DATOS DE USUARIO
        </h3>

        <form>

            <!-- Nombre -->
            <label class="form-label">Nombre Completo:</label>
            <div class="input-group mb-2">
                <span class="input-group-text icon-box">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="text" class="form-control input-custom" placeholder="Ingrese su nombre y apellido">
            </div>

            <!-- Correo -->
            <label class="form-label">Correo Electrónico:</label>
            <div class="input-group mb-2">
                <span class="input-group-text icon-box">
                    <i class="fa-solid fa-at"></i>
                </span>
                <input type="email" class="form-control input-custom" placeholder="ejemplo@correo.com">
            </div>

            <!-- Telefono -->
            <label class="form-label">Número de Teléfono:</label>
            <div class="input-group mb-2">
                <span class="input-group-text icon-box">
                    <i class="fa-solid fa-mobile"></i>
                </span>
                <input type="text" class="form-control input-custom" placeholder="+52 123 456 7890">
            </div>

            <!-- Ciudad -->
            <label class="form-label">Ciudad y Estado:</label>
            <div class="input-group mb-2">
                <span class="input-group-text icon-box">
                    <i class="fa-solid fa-location-dot"></i>
                </span>
                <input type="text" class="form-control input-custom" placeholder="Ingrese su ciudad y estado">
            </div>

            <!-- Mensaje -->
            <label class="form-label">Mensaje / Comentario:</label>
            <div class="input-group mb-2">
                <span class="input-group-text icon-box">
                    <i class="fa-solid fa-comment"></i>
                </span>
                <textarea class="form-control input-custom textarea" placeholder="Escriba su mensaje aquí (opcional)..."></textarea>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-2">

                <small class="text-muted">
                    *Al enviar, aceptas nuestra política de privacidad.*
                </small>

                <button class="btn btn-primary boton-enviar">
                    ENVIAR DATOS
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
